name: Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release-plan:
    name: Release plan
    runs-on: ubuntu-latest
    outputs:
      publish_crate: ${{ steps.plan.outputs.publish_crate }}
      publish_python: ${{ steps.plan.outputs.publish_python }}
      version: ${{ steps.plan.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check package version and registry state
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          python_version="$(python3 - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          if [ "$version" != "$python_version" ]; then
            echo "Cargo.toml version $version does not match pyproject.toml version $python_version" >&2
            exit 1
          fi
          if ! grep -Eq "^## $version([[:space:]-]|$)" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release entry for $version" >&2
            exit 1
          fi

          crate_published=0
          if cargo search '^lkh-rs$' --limit 20 | grep -Eq '^lkh-rs = "'"$version"'"'; then
            crate_published=1
          fi

          python_published=0
          status="$(curl -fsS -o /tmp/pypi-lkh-rs.json -w '%{http_code}' https://pypi.org/pypi/lkh-rs/json || true)"
          if [ "$status" = "200" ] && python3 - "$version" /tmp/pypi-lkh-rs.json <<'PY'
          import json
          import sys
          version = sys.argv[1]
          path = sys.argv[2]
          with open(path, "r", encoding="utf-8") as fh:
              data = json.load(fh)
          raise SystemExit(0 if version in data.get("releases", {}) else 1)
          PY
          then
            python_published=1
          elif [ "$status" != "200" ] && [ "$status" != "404" ]; then
            echo "Could not query PyPI for lkh-rs: HTTP $status" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish_crate=$((1 - crate_published))" >> "$GITHUB_OUTPUT"
          echo "publish_python=$((1 - python_published))" >> "$GITHUB_OUTPUT"

  python-wheels:
    name: Python wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [release-plan]
    if: needs.release-plan.outputs.publish_python == '1'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install bindgen dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - name: Install bindgen dependencies (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python-extension-module --compatibility pypi --out dist
          manylinux: "2014"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ runner.os }}
          path: dist/*.whl

  python-sdist:
    name: Python sdist
    runs-on: ubuntu-latest
    needs: [release-plan]
    if: needs.release-plan.outputs.publish_python == '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release-plan, python-wheels, python-sdist]
    if: always() && needs.release-plan.result == 'success'
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check Python artifacts
        if: needs.release-plan.outputs.publish_python == '1' && (needs.python-wheels.result != 'success' || needs.python-sdist.result != 'success')
        run: |
          echo "Python artifacts were not built successfully" >&2
          exit 1

      - name: Download Python artifacts
        if: needs.release-plan.outputs.publish_python == '1'
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        if: needs.release-plan.outputs.publish_python == '1'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Skip publish
        if: needs.release-plan.outputs.publish_python != '1'
        run: echo "Python package version is already published"

  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [release-plan, pypi]
    if: needs.release-plan.outputs.publish_crate == '1'
    environment: crates.io

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install bindgen dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - name: Package verification
        run: cargo package

      - name: Publish
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
